# cairn-miner config file (optional).
#
# Copy this to one of these locations (first one found wins):
#   ./config.toml                          next to where you run the miner
#   ~/.config/cairn-miner/config.toml      Linux / macOS
#   %APPDATA%\cairn-miner\config.toml      Windows
# or point at it explicitly with:  --config <path>
#
# Every setting is OPTIONAL and mirrors a CLI flag. Precedence is:
#   explicit CLI flag  >  this file  >  built-in default
# so anything you pass on the command line always overrides this file.

# Your addr20 payout address (40 lowercase hex, optional 0x prefix). Set it here
# and you can start the miner with no --address flag.
#address = "your40charhexaddr20goeshere0000000000000"

# Pool endpoint(s). Defaults to the public cairn pool if unset. A single string
# points at one pool; a list adds failover backups (the miner starts on the
# first that answers and walks down the list if a pool stays unreachable):
#pool = "cairn-pool.com:3333"
#pool = ["cairn-pool.com:3333", "backup.example.org:3333"]

# Worker/rig name. The pool authorizes as <address>.<worker> so each rig's stats
# show separately on the dashboard; payouts still go to the bare address.
# Defaults to this machine's hostname.
#worker = "rig-01"

# Backend: "auto" (default: cuda -> opencl -> cpu), "cpu", "opencl", or "cuda".
#backend = "auto"

# --- CPU dual-mining (only applies when a GPU backend is active) -------------
# cpu_threads = CPU worker threads that mine ALONGSIDE the GPU.
#   * Default is 0 (GPU-only): the GPU does the hashing and your CPU stays free.
#     This is the sane default — a full CPU pool on a GPU rig burns power and
#     heat for ~0.1% more hashrate, and on laptops it can LOWER GPU hashrate by
#     stealing the shared power/thermal budget.
#   * Raise it (e.g. 8 or 16) ONLY on a desktop with thermal headroom where you
#     want to stack CPU hashrate on top of the GPU.
#cpu_threads = 0

# Fraction of each work template's nonce range the CPU pool sweeps (0.0..=1.0);
# the GPU takes the rest. Ignored when cpu_threads = 0. Default: 0.4.
#cpu_share = 0.4

# --- CPU-only backend --------------------------------------------------------
# threads = total hashing threads for the CPU backend. Unset = all logical cores
# minus `reserve`.
#threads = 8
# reserve = cores to leave free for the OS / I/O when `threads` is unset.
#reserve = 4

# --- GPU device + launch geometry --------------------------------------------
# device = which GPU to mine on (list them with: cairn-miner --address X devices)
#device = 0
# Launch geometry — leave unset unless you are deliberately tuning throughput.
#blocks = 560
#threads_per_block = 256
#nonces_per_thread = 4096

# Send mining.suggest_difficulty at startup so the pool starts you near your
# real difficulty instead of ramping up (default true).
#suggest_difficulty = true
