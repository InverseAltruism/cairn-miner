# cairn-miner - HiveOS custom miner manifest.
# Install URL (flight sheet -> Miner: Custom -> "Installation URL"):
#   https://github.com/InverseAltruism/cairn-miner/releases/latest/download/cairn-miner-hiveos.tar.gz
# Flight-sheet fields (all standard - no dummy values needed):
#   Miner name in config : cairn-miner
#   Hash algorithm       : sha256d
#   Wallet and worker    : %WAL%   (your addr20; worker name is used as the rig name)
#   Pool URL             : cairn-pool.com:3333   (or leave blank to use the default)
#   Pass                 : x
#   Extra config args    : any cairn-miner flags, e.g.  --backend cuda   (optional; auto-detected)
# CUSTOM_VERSION is stamped from the release tag by CI (packaging step); the
# value here is the source-tree default.
CUSTOM_NAME=cairn-miner
CUSTOM_VERSION=0.2.3
CUSTOM_BUILD=1
CUSTOM_HASH_ALGO=sha256d
